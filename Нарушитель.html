<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Служебная Собака: Погоня</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .distance-bar-container {
            width: 300px;
            text-align: center;
        }

        .bar-bg {
            width: 100%;
            height: 20px;
            background: rgba(0,0,0,0.5);
            border: 2px solid white;
            position: relative;
            border-radius: 10px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #e74c3c, #f1c40f, #2ecc71);
            transition: width 0.2s;
        }

        .bar-label {
            position: absolute;
            width: 100%;
            top: 0;
            line-height: 20px;
            color: white;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 1px 1px 0 #000;
        }

        /* Экраны меню и конца игры */
        .screen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 30, 20, 0.95);
            color: white;
            padding: 40px;
            text-align: center;
            border: 4px solid #27ae60;
            pointer-events: auto;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            min-width: 400px;
            z-index: 10;
        }

        h1 {
            color: #2ecc71;
            margin-top: 0;
            font-size: 28px;
            text-transform: uppercase;
            line-height: 1.4;
        }

        h2 {
            color: #f1c40f;
            font-size: 20px;
        }

        .message {
            font-size: 16px;
            margin: 20px 0;
            color: #ecf0f1;
            line-height: 1.6;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 5px;
        }

        .stats {
            font-size: 18px;
            margin-bottom: 20px;
            color: #f1c40f;
        }

        .author {
            margin-top: 30px;
            font-size: 14px;
            color: #7f8c8d;
            border-top: 1px solid #444;
            padding-top: 10px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 0 #219150;
            transition: transform 0.1s;
        }

            button:hover {
                background: #2ecc71;
            }

            button:active {
                transform: translateY(4px);
                box-shadow: 0 0 0 #219150;
            }

        .btn-easy {
            background: #27ae60;
            box-shadow: 0 4px 0 #1e8449;
        }

        .btn-normal {
            background: #f39c12;
            box-shadow: 0 4px 0 #d35400;
        }

        .btn-hard {
            background: #c0392b;
            box-shadow: 0 4px 0 #922b21;
        }

        .controls-hint {
            text-align: center;
            color: #333;
            font-weight: bold;
            text-shadow: 1px 1px 0 #fff;
            margin-bottom: 20px;
        }

        #game-over-screen {
            display: none;
        }

        #start-screen {
            display: block;
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">
            <div class="distance-bar-container">
                <div class="bar-label">ДИСТАНЦИЯ ДО НАРУШИТЕЛЯ</div>
                <div class="bar-bg">
                    <div class="bar-fill" id="distanceBar"></div>
                </div>
            </div>
        </div>
        <div class="controls-hint">ПРОБЕЛ или КЛИК для прыжка</div>
    </div>

    <!-- Стартовое меню -->
    <div id="start-screen" class="screen">
        <h1>Служебная Собака</h1>
        <h2>Выберите уровень сложности</h2>
        <div class="btn-group">
            <button class="btn-easy" onclick="startGame(6)">Легко (Стажер)</button>
            <button class="btn-normal" onclick="startGame(9)">Нормально (Опытный)</button>
            <button class="btn-hard" onclick="startGame(13)">Сложно (Элита)</button>
        </div>
        <div class="author">Автор игры: Лебедев Д.С.</div>
    </div>

    <!-- Экран конца игры -->
    <div id="game-over-screen" class="screen">
        <h1 style="color: #e74c3c;">МИССИЯ ПРОВАЛЕНА</h1>
        <div class="message">
            Ты споткнулся!<br>
            Но не переживай: <b>Зеленая Буханка</b> поймала нарушителя на выезде из степи.
        </div>
        <div class="stats">
            Пройдено: <span id="finalScore">0</span> метров
        </div>
        <button onclick="showStartScreen()">В Меню</button>
        <div class="author">Автор игры: Лебедев Д.С.</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Элементы UI
        const distanceBar = document.getElementById('distanceBar');
        const finalScoreEl = document.getElementById('finalScore');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');

        // Настройки
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let gameState = 'menu'; // menu, playing, cutscene, end
        let frame = 0;
        let score = 0;
        let baseSpeed = 6;
        let currentSpeed = 6;
        let obstacles = [];
        let particles = [];
        let buhanka = null;

        let distanceToTarget = 100;

        // Ввод
        let jumpPressed = false;
        window.addEventListener('keydown', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = true;
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'Space' || e.code === 'ArrowUp') jumpPressed = false;
        });
        window.addEventListener('mousedown', () => jumpPressed = true);
        window.addEventListener('mouseup', () => jumpPressed = false);
        window.addEventListener('touchstart', () => jumpPressed = true);
        window.addEventListener('touchend', () => jumpPressed = false);

        // Классы
        class Dog {
            constructor() {
                this.w = 50;
                this.h = 30;
                this.x = 100;
                this.y = canvas.height - 150 - this.h;
                this.dy = 0;
                this.jumpForce = 14;
                this.originalY = this.y;
                this.grounded = true;
                this.color = '#d35400';
                this.isDead = false;
            }

            update() {
                if (this.isDead) return;

                if (jumpPressed && this.grounded) {
                    this.dy = -this.jumpForce;
                    this.grounded = false;
                    createParticles(this.x + this.w / 2, this.y + this.h, '#e67e22', 5);
                }

                this.y += this.dy;
                if (this.y + this.h < canvas.height - 150) {
                    this.dy += 0.7;
                    this.grounded = false;
                } else {
                    this.dy = 0;
                    this.grounded = true;
                    this.y = this.originalY;
                }
            }

            draw() {
                ctx.save();
                if (this.isDead) {
                    // Собака лежит
                    ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
                    ctx.rotate(Math.PI / 2);
                    ctx.translate(-(this.x + this.w / 2), -(this.y + this.h / 2));
                }

                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.w, this.h);
                ctx.fillRect(this.x + this.w, this.y - 10, 30, 30);

                ctx.fillStyle = '#a04000';
                ctx.fillRect(this.x + this.w + 5, this.y - 15, 10, 15);

                ctx.fillStyle = this.color;
                let tailWag = this.isDead ? 0 : Math.sin(frame * 0.8) * 10;
                ctx.fillRect(this.x - 15, this.y + 10 + tailWag, 15, 10);

                ctx.fillStyle = 'white';
                ctx.fillRect(this.x + this.w + 20, this.y - 5, 8, 8);
                ctx.fillStyle = 'black';
                ctx.fillRect(this.x + this.w + 24, this.y - 3, 4, 4);

                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(this.x + this.w + 2, this.y + 10, 25, 5);
                ctx.fillStyle = '#f1c40f';
                ctx.fillRect(this.x + this.w + 10, this.y + 11, 4, 4);

                ctx.restore();
            }
        }

        class Intruder {
            constructor() {
                this.w = 30;
                this.h = 50;
                this.baseX = 300;
                this.y = canvas.height - 150 - this.h;
                this.runAnim = 0;
                this.isCaught = false;
            }

            update() {
                if (this.isCaught) return;
                this.runAnim = Math.sin(frame * 0.3) * 5;
                let screenRatio = distanceToTarget / 100;
                this.x = this.baseX + (screenRatio * 400);
            }

            draw() {
                if (this.isCaught) return;
                ctx.save();
                ctx.fillStyle = '#7f8c8d';
                ctx.fillRect(this.x, this.y + 15, this.w, 35);
                ctx.fillStyle = '#f5cba7';
                ctx.fillRect(this.x + 5, this.y, 20, 20);
                ctx.fillStyle = '#2c3e50';
                ctx.fillRect(this.x + 5, this.y + 50, 10, 20 + this.runAnim);
                ctx.fillRect(this.x + 15, this.y + 50, 10, 20 - this.runAnim);
                ctx.fillStyle = '#e67e22';
                ctx.fillRect(this.x - 10, this.y + 20, 10, 20);
                ctx.restore();
            }
        }

        class Obstacle {
            constructor() {
                this.w = 30 + Math.random() * 20;
                this.h = 40 + Math.random() * 30;
                this.x = canvas.width;
                this.y = canvas.height - 150 - this.h;
                this.type = Math.random() > 0.5 ? 'rock' : 'bush';
            }

            update() {
                this.x -= currentSpeed;
            }

            draw() {
                if (this.type === 'rock') {
                    ctx.fillStyle = '#7f8c8d';
                    ctx.beginPath();
                    ctx.moveTo(this.x, this.y + this.h);
                    ctx.lineTo(this.x + this.w / 2, this.y);
                    ctx.lineTo(this.x + this.w, this.y + this.h);
                    ctx.fill();
                } else {
                    ctx.fillStyle = '#27ae60';
                    ctx.beginPath();
                    ctx.arc(this.x + this.w / 2, this.y + this.h / 2, this.w / 1.5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#2ecc71';
                    ctx.beginPath();
                    ctx.arc(this.x + this.w / 2 - 5, this.y + this.h / 2 - 5, 5, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        class Buhanka {
            constructor() {
                this.w = 140;
                this.h = 70;
                this.x = -200;
                this.y = canvas.height - 150 - this.h + 10; // Чуть ниже земли для колес
                this.speed = 15; // Быстрая
                this.targetX = 0; // Позиция где она ловит нарушителя
                this.arrived = false;
                this.sirenState = 0;
            }

            update(intruderX) {
                // Едет до тех пор, пока не накроет нарушителя
                if (this.x < intruderX - 20) {
                    this.x += this.speed;
                } else {
                    this.arrived = true;
                }
                this.sirenState = (this.sirenState + 1) % 15;
            }

            draw() {
                ctx.save();
                // Кузов (Зеленый)
                ctx.fillStyle = '#27ae60';
                // Основная коробка
                ctx.fillRect(this.x, this.y - 40, this.w, 50);
                // Кабина (скругленная спереди для стиля буханки)
                ctx.fillRect(this.x + this.w - 30, this.y - 40, 30, 50);

                // Полоса (белая)
                ctx.fillStyle = 'white';
                ctx.fillRect(this.x, this.y - 10, this.w, 10);

                // Окна
                ctx.fillStyle = '#34495e';
                ctx.fillRect(this.x + 10, this.y - 35, 40, 20); // Боковое
                ctx.fillRect(this.x + this.w - 25, this.y - 35, 20, 20); // Лобовое

                // Мигалка (синяя, так как это пограничники/полиция)
                if (this.sirenState < 8) {
                    ctx.fillStyle = '#3498db';
                    ctx.fillRect(this.x + 60, this.y - 45, 30, 8);
                } else {
                    ctx.fillStyle = '#2980b9';
                    ctx.fillRect(this.x + 60, this.y - 45, 30, 8);
                }

                // Колеса
                ctx.fillStyle = 'black';
                ctx.beginPath();
                ctx.arc(this.x + 30, this.y + 10, 14, 0, Math.PI * 2);
                ctx.arc(this.x + this.w - 30, this.y + 10, 14, 0, Math.PI * 2);
                ctx.fill();

                // Диски
                ctx.fillStyle = '#bdc3c7';
                ctx.beginPath();
                ctx.arc(this.x + 30, this.y + 10, 6, 0, Math.PI * 2);
                ctx.arc(this.x + this.w - 30, this.y + 10, 6, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.size = Math.random() * 5 + 2;
                this.vx = (Math.random() - 0.5) * 5;
                this.vy = (Math.random() - 0.5) * 5;
                this.life = 1.0;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.05;
            }
            draw() {
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
                ctx.globalAlpha = 1.0;
            }
        }

        let dog, intruder;

        function showStartScreen() {
            gameState = 'menu';
            startScreen.style.display = 'block';
            gameOverScreen.style.display = 'none';
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();
        }

        function startGame(speed) {
            baseSpeed = speed;
            currentSpeed = speed;
            dog = new Dog();
            intruder = new Intruder();
            obstacles = [];
            particles = [];
            buhanka = null;
            score = 0;
            distanceToTarget = 100;
            frame = 0;
            gameState = 'playing';
            startScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';
            animate();
        }

        function createParticles(x, y, color, count) {
            for (let i = 0; i < count; i++) {
                particles.push(new Particle(x, y, color));
            }
        }

        function spawnObstacle() {
            if (frame % Math.floor(900 / (currentSpeed * 1.1)) === 0) {
                if (obstacles.length === 0 || canvas.width - obstacles[obstacles.length - 1].x > 250) {
                    obstacles.push(new Obstacle());
                }
            }
        }

        function drawBackground() {
            let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, "#87CEEB");
            gradient.addColorStop(0.6, "#f1c40f");
            gradient.addColorStop(1, "#e67e22");
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#d3b89c';
            ctx.fillRect(0, canvas.height - 150, canvas.width, 150);

            ctx.fillStyle = '#27ae60';
            for (let i = 0; i < canvas.width; i += 50) {
                let offset = (i - frame * currentSpeed * 0.5) % canvas.width;
                if (offset < 0) offset += canvas.width;
                ctx.fillRect(offset, canvas.height - 150, 10, 10);
            }

            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(canvas.width - 100, 100, 40, 0, Math.PI * 2);
            ctx.fill();
        }

        function triggerGameOver() {
            gameState = 'cutscene';
            dog.isDead = true;
            // Запускаем сценарий с машиной
            buhanka = new Buhanka();

            // Ждем пока машина доедет до нарушителя
            let catchInterval = setInterval(() => {
                if (buhanka && buhanka.arrived) {
                    clearInterval(catchInterval);
                    intruder.isCaught = true; // Нарушитель исчезает/пойман
                    setTimeout(() => {
                        gameState = 'end';
                        finalScoreEl.innerText = Math.floor(score);
                        gameOverScreen.style.display = 'block';
                    }, 1000);
                }
            }, 100);
        }

        function animate() {
            if (gameState === 'menu') return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawBackground();

            if (gameState === 'playing') {
                frame++;
                score += currentSpeed * 0.05;

                if (frame % 10 === 0) {
                    distanceToTarget -= 0.15;
                    if (distanceToTarget < 0) distanceToTarget = 0;
                }

                if (distanceToTarget <= 5) {
                    distanceToTarget = 100;
                    score += 1000;
                    createParticles(intruder.x, intruder.y, '#f1c40f', 30);
                }

                distanceBar.style.width = distanceToTarget + '%';
                if (distanceToTarget < 30) distanceBar.style.background = '#2ecc71';
                else if (distanceToTarget < 70) distanceBar.style.background = '#f1c40f';
                else distanceBar.style.background = '#e74c3c';

                dog.update();
                dog.draw();

                intruder.update();
                intruder.draw();

                spawnObstacle();

                obstacles.forEach((obs, index) => {
                    obs.update();
                    obs.draw();

                    if (
                        dog.x < obs.x + obs.w - 10 &&
                        dog.x + dog.w > obs.x + 10 &&
                        dog.y < obs.y + obs.h &&
                        dog.y + dog.h > obs.y
                    ) {
                        createParticles(dog.x + dog.w / 2, dog.y + dog.h / 2, '#d35400', 20);
                        triggerGameOver();
                    }

                    if (obs.x + obs.w < 0) obstacles.splice(index, 1);
                });

                particles.forEach((p, index) => {
                    p.update();
                    p.draw();
                    if (p.life <= 0) particles.splice(index, 1);
                });

            } else if (gameState === 'cutscene' || gameState === 'end') {
                // Сцена поимки
                dog.draw(); // Собака лежит
                if (buhanka) {
                    buhanka.update(intruder.x);
                    buhanka.draw();
                }
                intruder.draw(); // Нарушитель виден пока его не накрыла машина
            }

            requestAnimationFrame(animate);
        }

        // Инициализация фона при загрузке
        drawBackground();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (dog) dog.originalY = canvas.height - 150 - dog.h;
            if (intruder) intruder.y = canvas.height - 150 - intruder.h;
            if (gameState === 'menu') drawBackground();
        });

    </script>
</body>
</html>
