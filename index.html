<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>ЧБ Новости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #3390ec);
            --tg-button: var(--tg-theme-button-color, #3390ec);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            line-height: 1.5;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            background: var(--tg-bg);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--tg-hint);
        }

        /* Status Bar */
        .status-bar {
            background: var(--tg-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        .status-online {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #34c759;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
        }

        .status-time {
            color: var(--tg-hint);
            font-size: 13px;
        }

        /* Sections */
        .section {
            background: var(--tg-bg);
            margin: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--tg-hint);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        /* Game Items */
        .game-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--tg-text);
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .game-item:last-child {
            border-bottom: none;
        }

        .game-item:active {
            background: var(--tg-secondary-bg);
        }

        .game-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 14px;
            color: white;
        }

        .game-icon.dog {
            background: linear-gradient(135deg, #ff9500, #ff5e3a);
        }

        .game-icon.pet {
            background: linear-gradient(135deg, #5ac8fa, #007aff);
        }

        .game-info {
            flex: 1;
        }

        .game-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .game-desc {
            font-size: 13px;
            color: var(--tg-hint);
        }

        .game-arrow {
            color: var(--tg-hint);
            font-size: 14px;
        }

        /* News Items */
        .news-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            padding: 2px 8px;
            border-radius: 6px;
            background: var(--tg-secondary-bg);
        }

        .tag-world {
            color: #007aff;
            background: rgba(0, 122, 255, 0.1);
        }

        .tag-russia {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.1);
        }

        .tag-svo {
            color: #ff9500;
            background: rgba(255, 149, 0, 0.1);
        }

        .news-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .news-time {
            font-size: 12px;
            color: var(--tg-hint);
        }

        /* Download Button */
        .download-section {
            padding: 16px;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-button);
            color: var(--tg-button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .download-btn:active {
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px 16px;
            color: var(--tg-hint);
            font-size: 13px;
        }

        .footer-link {
            color: var(--tg-link);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-hint);
            font-size: 14px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 30px 16px;
            color: var(--tg-hint);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 12px;
            opacity: 0.3;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-title">ЧБ Новости</div>
        <div class="header-subtitle">Информационный центр</div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-online">
            <div class="status-dot"></div>
            <span>Онлайн</span>
        </div>
        <div class="status-time" id="currentTime">--:--</div>
    </div>

    <!-- Games Section -->
    <div class="section">
        <div class="section-header">Игры</div>
        
        <a href="ВАША_ССЫЛКА_НА_СОБАКУ" class="game-item" id="gameDog">
            <div class="game-icon dog">
                <i class="fas fa-dog"></i>
            </div>
            <div class="game-info">
                <div class="game-name">Служебная Собака</div>
                <div class="game-desc">ПОГОНЯ ULTIMATE</div>
            </div>
            <div class="game-arrow">
                <i class="fas fa-chevron-right"></i>
            </div>
        </a>

        <a href="ВАША_ССЫЛКА_НА_PET" class="game-item" id="gamePet">
            <div class="game-icon pet">
                <i class="fas fa-paw"></i>
            </div>
            <div class="game-info">
                <div class="game-name">Virtual PET</div>
                <div class="game-desc">Тамагочи 2.0</div>
            </div>
            <div class="game-arrow">
                <i class="fas fa-chevron-right"></i>
            </div>
        </a>
    </div>

    <!-- News Section -->
    <div class="section">
        <div class="section-header">Последние новости</div>
        <div id="newsContainer">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div style="margin-top: 8px;">Загрузка...</div>
            </div>
        </div>
    </div>

    <!-- Download Section -->
    <div class="download-section">
        <button class="download-btn" id="downloadBtn">
            <i class="fas fa-download"></i>
            <span>Скачать дайджест</span>
        </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div>© 2026 ЧБ Новости</div>
        <a href="https://t.me/cheburashNEWS" class="footer-link" target="_blank">
            <i class="fab fa-telegram"></i>
            <span>Наш канал</span>
        </a>
    </footer>

    <script>
        // Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Update time
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        // News data
        const newsData = [
            { tag: 'Мир', class: 'tag-world', time: '14:32', text: 'Международные наблюдатели зафиксировали стабилизацию ситуации в регионе' },
            { tag: 'Россия', class: 'tag-russia', time: '13:15', text: 'Правительство утвердило новый пакет экономических мер' },
            { tag: 'СВО', class: 'tag-svo', time: '12:48', text: 'Минобороны сообщило о выполнении плановых задач' }
        ];

        // Render news
        function renderNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = newsData.map(item => `
                <div class="news-item">
                    <span class="news-tag ${item.class}">${item.tag}</span>
                    <div class="news-text">${item.text}</div>
                    <div class="news-time">${item.time}</div>
                </div>
            `).join('');
        }
        renderNews();

        // Haptic feedback
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => {
                if (tg.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            });
        });

        // Download
        document.getElementById('downloadBtn').addEventListener('click', () => {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            const date = new Date().toLocaleDateString('ru-RU');
            let content = `ЧБ Дайджест\n${date}\n\n`;
            content += `Игры:\n`;
            content += `• Служебная Собака: ПОГОНЯ ULTIMATE\n`;
            content += `• Virtual PET: Тамагочи 2.0\n\n`;
            content += `Новости:\n`;
            newsData.forEach(item => {
                content += `[${item.tag}] ${item.time} — ${item.text}\n`;
            });
            content += `\nКанал: t.me/cheburashNEWS`;

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CHB_${Date.now()}.txt`;
            a.click();

            tg.showAlert({
                title: 'Готово',
                message: 'Дайджест загружен',
                buttons: [{ type: 'ok' }]
            });
        });

        // Configure game links (replace with your links)
        // document.getElementById('gameDog').href = 'YOUR_LINK_HERE';
        // document.getElementById('gamePet').href = 'YOUR_LINK_HERE';
    </script>
</body>
</html>
