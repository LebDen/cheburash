<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0f1a">
    <title>ЧБ | Центр Управления</title>
    <!-- Telegram Web App Script -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-area">
            <div class="logo-badge">ЧБ</div>
            <span class="app-title">Центр Управления</span>
        </div>
        <button class="theme-btn" id="themeToggle">
            <i class="fas fa-moon"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="app-container">
        
        <!-- Status Block -->
        <div class="status-card">
            <div class="status-indicator active"></div>
            <div class="status-text">
                <h3>Система в норме</h3>
                <p>Последнее обновление: <span id="lastUpdate">только что</span></p>
            </div>
        </div>

        <!-- GAMES SECTION -->
        <section class="section-block">
            <h2 class="section-title"><i class="fas fa-gamepad"></i> Игровой сектор</h2>
            
            <div class="games-grid">
                <!-- Game 1 -->
                <a href="ССЫЛКА_НА_ИГРУ_СОБАКА" class="game-card game-dog">
                    <div class="game-icon">
                        <i class="fas fa-dog"></i>
                    </div>
                    <div class="game-info">
                        <h3>Служебная Собака</h3>
                        <span>ПОГОНЯ ULTIMATE</span>
                    </div>
                    <div class="game-action">
                        <i class="fas fa-play"></i>
                    </div>
                </a>

                <!-- Game 2 -->
                <a href="ССЫЛКА_НА_ИГРУ_PET" class="game-card game-pet">
                    <div class="game-icon">
                        <i class="fas fa-paw"></i>
                    </div>
                    <div class="game-info">
                        <h3>Virtual PET</h3>
                        <span>Тамагочи 2.0</span>
                    </div>
                    <div class="game-action">
                        <i class="fas fa-play"></i>
                    </div>
                </a>
            </div>
        </section>

        <!-- NEWS BRIEFING SECTION -->
        <section class="section-block">
            <h2 class="section-title"><i class="fas fa-briefing"></i> Информирование</h2>
            
            <div class="news-preview" id="newsPreview">
                <!-- Сюда JS загрузит 3 последние новости -->
                <div class="loading-sm">Загрузка сводки...</div>
            </div>

            <button class="btn-download" id="downloadDigestBtn">
                <i class="fas fa-file-download"></i>
                <span>Скачать полный дайджест</span>
            </button>
        </section>

    </main>

    <!-- Footer -->
    <footer class="app-footer">
        <p>© 2026 ЧБ Новости | Telegram Mini App</p>
        <a href="https://t.me/cheburashNEWS" class="tg-link">
            <i class="fab fa-telegram"></i> Наш канал
        </a>
    </footer>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="rss-parser.js"></script>
    <script src="main.js"></script>
    <script>
        // Telegram Mini App Initialization
        const tg = window.Telegram.WebApp;
        tg.expand(); // Раскрыть на весь экран

        // Apply Telegram Theme Colors
        document.documentElement.style.setProperty('--tg-bg', tg.themeParams.bg_color || '#ffffff');
        document.documentElement.style.setProperty('--tg-text', tg.themeParams.text_color || '#000000');
        document.documentElement.style.setProperty('--tg-hint', tg.themeParams.hint_color || '#999999');
        document.documentElement.style.setProperty('--tg-link', tg.themeParams.link_color || '#2481cc');
        document.documentElement.style.setProperty('--tg-button', tg.themeParams.button_color || '#2481cc');
        document.documentElement.style.setProperty('--tg-button-text', tg.themeParams.button_text_color || '#ffffff');

        // Handle Theme Toggle based on Telegram settings
        const themeToggle = document.getElementById('themeToggle');
        if (tg.colorScheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            themeToggle.querySelector('i').className = 'fas fa-sun';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            themeToggle.querySelector('i').className = 'fas fa-moon';
        }

        themeToggle.addEventListener('click', () => {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            themeToggle.querySelector('i').className = next === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
        });

        // Haptic Feedback for buttons (Native feel)
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });
    </script>
</body>
</html>
