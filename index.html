<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>ЧБ Новости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #3390ec);
            --tg-button: var(--tg-theme-button-color, #3390ec);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --border: rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            line-height: 1.5;
            padding-bottom: 20px;
        }

        /* Header */
        .header {
            background: var(--tg-bg);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .header-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .header-subtitle {
            font-size: 13px;
            color: var(--tg-hint);
        }

        /* Status Bar */
        .status-bar {
            background: var(--tg-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }

        .status-online {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #34c759;
            font-weight: 500;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #34c759;
            border-radius: 50%;
        }

        .status-time {
            color: var(--tg-hint);
            font-size: 13px;
        }

        /* Sections */
        .section {
            background: var(--tg-bg);
            margin: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--tg-hint);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .refresh-btn {
            background: none;
            border: none;
            color: var(--tg-link);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .refresh-btn:active {
            background: var(--tg-secondary-bg);
        }

        /* Game Items */
        .game-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            text-decoration: none;
            color: var(--tg-text);
            border-bottom: 1px solid var(--border);
            transition: background 0.2s;
        }

        .game-item:last-child {
            border-bottom: none;
        }

        .game-item:active {
            background: var(--tg-secondary-bg);
        }

        .game-icon {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-right: 14px;
            color: white;
        }

        .game-icon.dog {
            background: linear-gradient(135deg, #ff9500, #ff5e3a);
        }

        .game-icon.pet {
            background: linear-gradient(135deg, #5ac8fa, #007aff);
        }

        .game-info {
            flex: 1;
        }

        .game-name {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .game-desc {
            font-size: 13px;
            color: var(--tg-hint);
        }

        .game-arrow {
            color: var(--tg-hint);
            font-size: 14px;
        }

        /* News Items */
        .news-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-tag {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            padding: 2px 8px;
            border-radius: 6px;
        }

        .tag-world {
            color: #007aff;
            background: rgba(0, 122, 255, 0.1);
        }

        .tag-russia {
            color: #ff3b30;
            background: rgba(255, 59, 48, 0.1);
        }

        .tag-svo {
            color: #ff9500;
            background: rgba(255, 149, 0, 0.1);
        }

        .news-text {
            font-size: 15px;
            line-height: 1.4;
            margin-bottom: 6px;
        }

        .news-source {
            font-size: 12px;
            color: var(--tg-hint);
            margin-bottom: 4px;
        }

        .news-time {
            font-size: 12px;
            color: var(--tg-hint);
        }

        /* Category Section */
        .category-block {
            border-top: 1px solid var(--border);
        }

        .category-block:first-child {
            border-top: none;
        }

        .category-title {
            padding: 10px 16px;
            font-size: 14px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--tg-secondary-bg);
        }

        /* Download Button */
        .download-section {
            padding: 16px;
        }

        .download-btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-button);
            color: var(--tg-button-text);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s;
        }

        .download-btn:active {
            opacity: 0.8;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 20px 16px;
            color: var(--tg-hint);
            font-size: 13px;
        }

        .footer-link {
            color: var(--tg-link);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 14px;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-hint);
            font-size: 14px;
        }

        .loading i {
            margin-bottom: 8px;
        }

        /* Error state */
        .error-state {
            text-align: center;
            padding: 20px;
            color: #ff3b30;
            font-size: 14px;
        }

        /* Category badge */
        .category-badge {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--tg-secondary-bg);
            color: var(--tg-hint);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-title">ЧБ Новости</div>
        <div class="header-subtitle">Информационный центр</div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-online">
            <div class="status-dot"></div>
            <span>Онлайн</span>
        </div>
        <div class="status-time" id="currentTime">--:--</div>
    </div>

    <!-- Games Section -->
    <div class="section">
        <div class="section-header">Игры</div>
        
        <a href="ВАША_ССЫЛКА_НА_СОБАКУ" class="game-item" id="gameDog">
            <div class="game-icon dog">
                <i class="fas fa-dog"></i>
            </div>
            <div class="game-info">
                <div class="game-name">Служебная Собака</div>
                <div class="game-desc">ПОГОНЯ ULTIMATE</div>
            </div>
            <div class="game-arrow">
                <i class="fas fa-chevron-right"></i>
            </div>
        </a>

        <a href="ВАША_ССЫЛКА_НА_PET" class="game-item" id="gamePet">
            <div class="game-icon pet">
                <i class="fas fa-paw"></i>
            </div>
            <div class="game-info">
                <div class="game-name">Virtual PET</div>
                <div class="game-desc">Тамагочи 2.0</div>
            </div>
            <div class="game-arrow">
                <i class="fas fa-chevron-right"></i>
            </div>
        </a>
    </div>

    <!-- News Section -->
    <div class="section">
        <div class="section-header">
            <span>Последние новости</span>
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
        </div>
        <div id="newsContainer">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Загрузка новостей...</div>
            </div>
        </div>
    </div>

    <!-- Download Section -->
    <div class="download-section">
        <button class="download-btn" id="downloadBtn">
            <i class="fas fa-file-download"></i>
            <span>Скачать дайджест</span>
        </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div>© 2026 ЧБ Новости</div>
        <a href="https://t.me/cheburashNEWS" class="footer-link" target="_blank">
            <i class="fab fa-telegram"></i>
            <span>Наш канал</span>
        </a>
    </footer>

    <script>
        // ==================== CONFIG ====================
        const CONFIG = {
            RSS_FEEDS: {
                world: [
                    'https://ria.ru/export/rss2/index.xml',
                    'https://tass.ru/rss/v2.xml'
                ],
                russia: [
                    'https://ria.ru/export/rss2/russia.xml',
                    'https://rg.ru/rss/region.xml'
                ],
                svo: [
                    'https://tass.ru/rss/v2.xml?feed=48'
                ]
            },
            CORS_PROXY: 'https://api.allorigins.win/raw?url=',
            MAX_NEWS_PER_CATEGORY: 5,
            TIMEOUT: 10000
        };

        // ==================== TELEGRAM INIT ====================
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ==================== STATE ====================
        let newsCache = {
            world: [],
            russia: [],
            svo: []
        };
        let lastUpdateTime = null;

        // ==================== UTILS ====================
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = 
                now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            lastUpdateTime = now;
        }
        setInterval(updateTime, 1000);
        updateTime();

        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function timeAgo(date) {
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'только что';
            if (diff < 3600) return `${Math.floor(diff/60)} мин. назад`;
            if (diff < 86400) return `${Math.floor(diff/3600)} ч. назад`;
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function haptic(type = 'light') {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred(type);
            }
        }

        // ==================== RSS PARSER ====================
        async function fetchFeed(url) {
            try {
                const proxyUrl = CONFIG.CORS_PROXY + encodeURIComponent(url);
                const response = await fetch(proxyUrl, {
                    signal: AbortSignal.timeout(CONFIG.TIMEOUT)
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const xml = await response.text();
                
                const parser = new RSSParser();
                const feed = await parser.parseString(xml);
                
                return feed.items.slice(0, CONFIG.MAX_NEWS_PER_CATEGORY).map(item => ({
                    title: stripHtml(item.title),
                    description: stripHtml(item.description || '').substring(0, 200),
                    link: item.link,
                    pubDate: item.pubDate ? new Date(item.pubDate) : new Date(),
                    source: item.source || new URL(item.link).hostname
                }));
            } catch (error) {
                console.warn(`Ошибка загрузки ${url}:`, error.message);
                return null;
            }
        }

        async function fetchCategory(category) {
            const feeds = CONFIG.RSS_FEEDS[category] || [];
            if (!feeds.length) return [];
            
            const results = await Promise.allSettled(feeds.map(url => fetchFeed(url)));
            
            const allItems = results
                .filter(r => r.status === 'fulfilled' && r.value)
                .flatMap(r => r.value)
                .sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, CONFIG.MAX_NEWS_PER_CATEGORY);
            
            return allItems.map(item => ({
                ...item,
                category,
                timeAgo: timeAgo(item.pubDate)
            }));
        }

        async function loadAllNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = `
                <div class="loading">
                    <i class="fas fa-circle-notch fa-spin"></i>
                    <div>Загрузка новостей...</div>
                </div>
            `;

            try {
                const [world, russia, svo] = await Promise.all([
                    fetchCategory('world'),
                    fetchCategory('russia'),
                    fetchCategory('svo')
                ]);

                newsCache = { world, russia, svo };
                renderNews();
                updateTime();
            } catch (error) {
                container.innerHTML = `
                    <div class="error-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <div style="margin-top: 8px;">Ошибка загрузки новостей</div>
                        <button class="refresh-btn" onclick="loadAllNews()" style="margin-top: 12px;">
                            <i class="fas fa-sync-alt"></i> Повторить
                        </button>
                    </div>
                `;
            }
        }

        function renderNews() {
            const container = document.getElementById('newsContainer');
            const categories = [
                { key: 'world', name: '🌍 Мир', class: 'tag-world' },
                { key: 'russia', name: '🇷🇺 Россия', class: 'tag-russia' },
                { key: 'svo', name: '⚔️ СВО', class: 'tag-svo' }
            ];

            let html = '';
            categories.forEach(cat => {
                const items = newsCache[cat.key] || [];
                if (items.length === 0) return;

                html += `
                    <div class="category-block">
                        <div class="category-title">
                            ${cat.name}
                            <span class="category-badge">${items.length}</span>
                        </div>
                        ${items.map(item => `
                            <div class="news-item">
                                <div class="news-source">${item.source} • ${item.timeAgo}</div>
                                <div class="news-text">${item.title}</div>
                                <a href="${item.link}" class="news-time" target="_blank" style="color: var(--tg-link); text-decoration: none;">
                                    Читать →
                                </a>
                            </div>
                        `).join('')}
                    </div>
                `;
            });

            if (html === '') {
                html = `
                    <div class="error-state">
                        <i class="fas fa-inbox"></i>
                        <div style="margin-top: 8px;">Нет новостей</div>
                        <button class="refresh-btn" onclick="loadAllNews()" style="margin-top: 12px;">
                            <i class="fas fa-sync-alt"></i> Обновить
                        </button>
                    </div>
                `;
            }

            container.innerHTML = html;
        }

        // ==================== DOWNLOAD DIGEST ====================
        function generateDigestContent() {
            const date = new Date().toLocaleDateString('ru-RU', { 
                day: 'numeric', month: 'long', year: 'numeric' 
            });
            const time = new Date().toLocaleTimeString('ru-RU', { 
                hour: '2-digit', minute: '2-digit' 
            });

            let content = `╔════════════════════════════════════════════════════╗\n`;
            content += `         ЧБ НОВОСТИ | ИНФОРМАЦИОННЫЙ ДАЙДЖЕСТ\n`;
            content += `╚════════════════════════════════════════════════════╝\n\n`;
            content += `📅 Дата: ${date}\n`;
            content += `⏰ Время: ${time}\n`;
            content += `📊 Статус: Актуальная сводка\n\n`;
            content += `═══════════════════════════════════════════════════════\n\n`;

            // Games
            content += `🎮 ИГРОВЫЕ МОДУЛИ\n`;
            content += `───────────────────────────────────────────────────────\n`;
            content += `  [1] Служебная Собака: ПОГОНЯ ULTIMATE\n`;
            content += `  [2] Virtual PET: Тамагочи 2.0\n\n`;

            // News by category
            const categories = [
                { key: 'world', name: '🌍 МИР' },
                { key: 'russia', name: '🇷🇺 РОССИЯ' },
                { key: 'svo', name: '⚔️ СВО' }
            ];

            categories.forEach(cat => {
                const items = newsCache[cat.key] || [];
                content += `${cat.name}\n`;
                content += `───────────────────────────────────────────────────────\n`;
                
                if (items.length === 0) {
                    content += `  Нет данных\n\n`;
                } else {
                    items.forEach((item, index) => {
                        content += `  [${index + 1}] ${item.title}\n`;
                        content += `      Источник: ${item.source}\n`;
                        content += `      Время: ${item.timeAgo}\n`;
                        content += `      Ссылка: ${item.link}\n\n`;
                    });
                }
            });

            content += `═══════════════════════════════════════════════════════\n\n`;
            content += `📬 ТЕЛЕГРАМ КАНАЛ: t.me/cheburashNEWS\n`;
            content += `🤖 БОТ: @CheburashNEWS_bot\n\n`;
            content += `╔════════════════════════════════════════════════════╗\n`;
            content += `         © 2026 ЧБ НОВОСТНОЙ АГРЕГАТОР\n`;
            content += `╚════════════════════════════════════════════════════╝\n`;

            return content;
        }

        function downloadDigest() {
            haptic('success');
            
            const content = generateDigestContent();
            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CHB_Digest_${new Date().toISOString().slice(0,10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            tg.showAlert({
                title: '✅ Готово',
                message: 'Дайджест загружен на ваше устройство',
                buttons: [{ type: 'ok' }]
            });
        }

        // ==================== EVENT LISTENERS ====================
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => haptic('light'));
        });

        document.getElementById('refreshBtn').addEventListener('click', () => {
            haptic('medium');
            loadAllNews();
        });

        document.getElementById('downloadBtn').addEventListener('click', downloadDigest);

        // Configure game links
        // document.getElementById('gameDog').href = 'ВАША_ССЫЛКА';
        // document.getElementById('gamePet').href = 'ВАША_ССЫЛКА';

        // ==================== INIT ====================
        loadAllNews();
    </script>
</body>
</html>
