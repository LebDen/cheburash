<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <title>ЧБ | Neural Interface</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* === CORE & ANIMATIONS === */
        :root {
            --bg-deep: #050505;
            --glass-bg: rgba(20, 20, 25, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: rgba(255, 255, 255, 0.15);
            --neon-blue: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-green: #0aff60;
            --text-main: #ffffff;
            --text-dim: #8b9bb4;
            --font-main: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        [data-theme="light"] {
            --bg-deep: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.75);
            --glass-border: rgba(0, 0, 0, 0.05);
            --text-main: #1a1a1a;
            --text-dim: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--font-main);
            background-color: var(--bg-deep);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background Mesh */
        .ambient-light {
            position: fixed; top: -20%; left: -20%; width: 140%; height: 140%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.08), transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(188, 19, 254, 0.08), transparent 50%);
            z-index: -1;
            animation: breathe 10s infinite alternate;
            pointer-events: none;
        }
        @keyframes breathe { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(1.1); opacity: 1; } }

        /* === GLASS COMPONENTS === */
        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
        }

        /* === HEADER === */
        header {
            padding: 24px 20px 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .user-status { display: flex; flex-direction: column; gap: 4px; }
        .greeting { font-size: 13px; color: var(--neon-blue); font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 1px; }
        .username { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .theme-btn {
            width: 44px; height: 44px; border-radius: 16px;
            background: var(--glass-bg); border: 1px solid var(--glass-border);
            color: var(--text-main); display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: 0.3s;
        }
        .theme-btn:active { transform: scale(0.9); background: var(--glass-highlight); }

        /* === LIVE STATUS BAR === */
        .status-bar {
            margin: 10px 20px; padding: 12px 16px;
            display: flex; justify-content: space-between; align-items: center;
            font-family: var(--font-mono); font-size: 11px; color: var(--text-dim);
        }
        .live-indicator { display: flex; align-items: center; gap: 6px; color: var(--neon-green); }
        .dot { width: 6px; height: 6px; background: currentColor; border-radius: 50%; box-shadow: 0 0 8px currentColor; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* === GAMES GRID === */
        .section-label {
            padding: 0 24px; margin-top: 24px; margin-bottom: 12px;
            font-size: 12px; font-weight: 700; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;
            display: flex; align-items: center; gap: 8px;
        }
        .section-label i { color: var(--neon-purple); }

        .games-grid {
            display: grid; grid-template-columns: 1fr; gap: 16px; padding: 0 20px;
        }
        
        .game-card {
            display: flex; align-items: center; padding: 20px;
            text-decoration: none; color: var(--text-main);
            position: relative; overflow: hidden; transition: transform 0.2s;
        }
        .game-card:active { transform: scale(0.98); }
        
        /* Glow effect on hover/active */
        .game-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
            opacity: 0; transition: 0.3s;
        }
        .game-card:active::before { opacity: 1; }

        .game-icon-box {
            width: 60px; height: 60px; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; color: white; margin-right: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1;
        }
        .dog-gradient { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%); }
        .pet-gradient { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }

        .game-meta { z-index: 1; flex: 1; }
        .game-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .game-subtitle { font-size: 12px; color: var(--text-dim); font-family: var(--font-mono); }
        
        .launch-btn {
            z-index: 1; width: 40px; height: 40px; border-radius: 50%;
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            color: white; display: flex; align-items: center; justify-content: center;
            transition: 0.3s;
        }
        .game-card:active .launch-btn { background: var(--text-main); color: var(--bg-deep); }

        /* === NEWS TERMINAL === */
        .news-terminal {
            margin: 24px 20px; padding: 0; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .terminal-header {
            padding: 16px; border-bottom: 1px solid var(--glass-border);
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.2);
        }
        .terminal-title { font-family: var(--font-mono); font-size: 12px; color: var(--neon-blue); }
        .terminal-count { font-family: var(--font-mono); font-size: 10px; background: var(--glass-highlight); padding: 2px 6px; border-radius: 4px; }

        .news-list { padding: 0; }
        .news-item {
            padding: 16px; border-bottom: 1px solid var(--glass-border);
            font-size: 14px; line-height: 1.5; position: relative;
            transition: background 0.2s;
        }
        .news-item:last-child { border-bottom: none; }
        .news-item:active { background: rgba(255,255,255,0.03); }
        
        .news-source {
            font-family: var(--font-mono); font-size: 10px;
            padding: 2px 6px; border-radius: 4px; margin-bottom: 6px; display: inline-block;
            font-weight: 700;
        }
        .src-world { background: rgba(0, 243, 255, 0.15); color: var(--neon-blue); }
        .src-rf { background: rgba(255, 69, 58, 0.15); color: #ff453a; }
        .src-svo { background: rgba(255, 159, 10, 0.15); color: var(--neon-green); }

        /* === ACTION BUTTON === */
        .action-area { padding: 0 20px 30px; }
        .btn-download {
            width: 100%; padding: 18px; border-radius: 20px;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            border: none; color: white; font-size: 16px; font-weight: 700;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.2);
            cursor: pointer; position: relative; overflow: hidden;
        }
        .btn-download::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }
        .btn-download:active::after { left: 100%; }

        /* === FOOTER === */
        footer { text-align: center; padding-bottom: 30px; opacity: 0.5; font-size: 11px; font-family: var(--font-mono); }
        .tg-link { color: var(--text-main); text-decoration: none; border-bottom: 1px dashed var(--text-dim); }

    </style>
</head>
<body>

    <div class="ambient-light"></div>

    <header>
        <div class="user-status">
            <span class="greeting" id="greetingText">Загрузка...</span>
            <span class="username">Оператор ЧБ</span>
        </div>
        <button class="theme-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
    </header>

    <div class="status-bar glass-panel">
        <div class="live-indicator"><div class="dot"></div> ONLINE</div>
        <div id="clock">00:00:00</div>
    </div>

    <div class="section-label"><i class="fas fa-gamepad"></i> Доступные миссии</div>
    
    <div class="games-grid">
        <!-- GAME 1 -->
        <a href="ВАША_ССЫЛКА_НА_СОБАКУ" class="game-card glass-panel" id="linkDog">
            <div class="game-icon-box dog-gradient"><i class="fas fa-dog"></i></div>
            <div class="game-meta">
                <div class="game-title">Служебная Собака</div>
                <div class="game-subtitle">ПОГОНЯ ULTIMATE</div>
            </div>
            <div class="launch-btn"><i class="fas fa-chevron-right"></i></div>
        </a>

        <!-- GAME 2 -->
        <a href="ВАША_ССЫЛКА_НА_PET" class="game-card glass-panel" id="linkPet">
            <div class="game-icon-box pet-gradient"><i class="fas fa-paw"></i></div>
            <div class="game-meta">
                <div class="game-title">Virtual PET</div>
                <div class="game-subtitle">СИМУЛЯТОР 2.0</div>
            </div>
            <div class="launch-btn"><i class="fas fa-chevron-right"></i></div>
        </a>
    </div>

    <div class="section-label"><i class="fas fa-satellite-dish"></i> Входящие данные</div>

    <div class="news-terminal glass-panel">
        <div class="terminal-header">
            <span class="terminal-title">/// ПОСЛЕДНИЕ СОБЫТИЯ</span>
            <span class="terminal-count" id="newsCount">0 NEW</span>
        </div>
        <div class="news-list" id="newsList">
            <div style="padding:20px; text-align:center; color:var(--text-dim); font-size:12px;">
                <i class="fas fa-circle-notch fa-spin"></i> Расшифровка потока...
            </div>
        </div>
    </div>

    <div class="action-area">
        <button class="btn-download" id="downloadBtn">
            <i class="fas fa-file-export"></i>
            <span>Скачать Дайджест</span>
        </button>
    </div>

    <footer>
        <p>SYSTEM VERSION 2026.4</p>
        <a href="https://t.me/cheburashNEWS" class="tg-link">CHANNEL_ACCESS</a>
    </footer>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // === 1. INTELLIGENT GREETING ===
        const hour = new Date().getHours();
        const greetingEl = document.getElementById('greetingText');
        let greeting = 'Доброй ночи';
        if (hour >= 5 && hour < 12) greeting = 'Доброе утро';
        else if (hour >= 12 && hour < 18) greeting = 'Добрый день';
        else if (hour >= 18 && hour < 23) greeting = 'Добрый вечер';
        greetingEl.textContent = `${greeting}, Оператор`;

        // === 2. LIVE CLOCK ===
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('ru-RU');
        }
        setInterval(updateClock, 1000);
        updateClock();

        // === 3. THEME LOGIC ===
        const themeBtn = document.getElementById('themeToggle');
        const icon = themeBtn.querySelector('i');
        
        // Auto-detect Telegram theme
        if (tg.colorScheme === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            icon.className = 'fas fa-moon';
        }

        themeBtn.addEventListener('click', () => {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
            icon.className = isDark ? 'fas fa-moon' : 'fas fa-sun';
            if(tg.HapticFeedback) tg.HapticFeedback.selectionChanged();
        });

        // === 4. NEWS DATA (Mocked for Stability) ===
        const newsData = [
            { source: 'МИР', class: 'src-world', text: 'Глобальные рынки показывают стабильный рост на фоне новых технологий.' },
            { source: 'РОССИЯ', class: 'src-rf', text: 'Запущен новый спутник связи для покрытия отдаленных регионов.' },
            { source: 'СВО', class: 'src-svo', text: 'Подразделения выполнили плановые задачи на указанном направлении.' }
        ];

        const newsList = document.getElementById('newsList');
        document.getElementById('newsCount').textContent = `${newsData.length} NEW`;
        
        newsList.innerHTML = newsData.map(item => `
            <div class="news-item">
                <span class="news-source ${item.class}">${item.source}</span>
                <div>${item.text}</div>
            </div>
        `).join('');

        // === 5. HAPTICS & DOWNLOAD ===
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => {
                if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            });
        });

        document.getElementById('downloadBtn').addEventListener('click', () => {
            if(tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            
            const content = `ЧБ ДАЙДЖЕСТ // ${new Date().toLocaleDateString()}\n\n` + 
                            newsData.map(n => `[${n.source}] ${n.text}`).join('\n') + 
                            `\n\n/// КОНЕЦ ПЕРЕДАЧИ`;
            
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'CHB_REPORT.txt';
            a.click();
            
            tg.showAlert({ title: 'Успешно', message: 'Отчет загружен в устройство.' });
        });

        // === 6. CONFIG LINKS (Edit Here) ===
        // Замените ссылки ниже на свои
        // document.getElementById('linkDog').href = "https://your-game-link.com/dog";
        // document.getElementById('linkPet').href = "https://your-game-link.com/pet";

    </script>
</body>
</html>
