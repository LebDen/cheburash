<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>ЧБ Новости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --tg-bg: var(--tg-theme-bg-color, #ffffff);
            --tg-text: var(--tg-theme-text-color, #000000);
            --tg-hint: var(--tg-theme-hint-color, #999999);
            --tg-link: var(--tg-theme-link-color, #3390ec);
            --tg-button: var(--tg-theme-button-color, #3390ec);
            --tg-button-text: var(--tg-theme-button-text-color, #ffffff);
            --tg-secondary-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
            --border: rgba(0, 0, 0, 0.1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-secondary-bg);
            color: var(--tg-text);
            line-height: 1.5;
            padding-bottom: 20px;
        }
        .header {
            background: var(--tg-bg);
            padding: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }
        .header-title { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .header-subtitle { font-size: 13px; color: var(--tg-hint); }
        .status-bar {
            background: var(--tg-bg);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
        }
        .status-online { display: flex; align-items: center; gap: 6px; color: #34c759; font-weight: 500; }
        .status-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .status-time { color: var(--tg-hint); font-size: 13px; }
        .section {
            background: var(--tg-bg);
            margin: 12px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }
        .section-header {
            padding: 12px 16px 8px;
            font-size: 13px;
            color: var(--tg-hint);
            text-transform: uppercase;
            font-weight: 500;
            letter-spacing: 0.3px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .refresh-btn {
            background: none; border: none; color: var(--tg-link);
            font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 6px;
            display: flex; align-items: center; gap: 4px;
        }
        .refresh-btn:active { background: var(--tg-secondary-bg); }
        .game-item {
            display: flex; align-items: center; padding: 14px 16px;
            text-decoration: none; color: var(--tg-text);
            border-bottom: 1px solid var(--border); transition: background 0.2s;
        }
        .game-item:last-child { border-bottom: none; }
        .game-item:active { background: var(--tg-secondary-bg); }
        .game-icon {
            width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; margin-right: 14px; color: white;
        }
        .game-icon.dog { background: linear-gradient(135deg, #ff9500, #ff5e3a); }
        .game-icon.pet { background: linear-gradient(135deg, #5ac8fa, #007aff); }
        .game-info { flex: 1; }
        .game-name { font-size: 16px; font-weight: 500; margin-bottom: 2px; }
        .game-desc { font-size: 13px; color: var(--tg-hint); }
        .game-arrow { color: var(--tg-hint); font-size: 14px; }
        .news-item { padding: 14px 16px; border-bottom: 1px solid var(--border); }
        .news-item:last-child { border-bottom: none; }
        .news-tag {
            display: inline-block; font-size: 12px; font-weight: 600;
            margin-bottom: 6px; padding: 2px 8px; border-radius: 6px;
        }
        .tag-world { color: #007aff; background: rgba(0, 122, 255, 0.1); }
        .tag-russia { color: #ff3b30; background: rgba(255, 59, 48, 0.1); }
        .tag-svo { color: #ff9500; background: rgba(255, 149, 0, 0.1); }
        .news-text { font-size: 15px; line-height: 1.4; margin-bottom: 6px; }
        .news-source { font-size: 12px; color: var(--tg-hint); margin-bottom: 4px; }
        .news-time { font-size: 12px; color: var(--tg-hint); }
        .category-block { border-top: 1px solid var(--border); }
        .category-block:first-child { border-top: none; }
        .category-title {
            padding: 10px 16px; font-size: 14px; font-weight: 600;
            display: flex; align-items: center; gap: 8px;
            background: var(--tg-secondary-bg);
        }
        .category-badge {
            font-size: 11px; padding: 2px 6px; border-radius: 4px;
            background: var(--tg-secondary-bg); color: var(--tg-hint);
        }
        .download-section { padding: 16px; }
        .download-btn {
            width: 100%; padding: 14px; background: var(--tg-button);
            color: var(--tg-button-text); border: none; border-radius: 12px;
            font-size: 16px; font-weight: 500; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: opacity 0.2s;
        }
        .download-btn:active { opacity: 0.8; }
        .footer {
            text-align: center; padding: 20px 16px;
            color: var(--tg-hint); font-size: 13px;
        }
        .footer-link {
            color: var(--tg-link); text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px; margin-top: 8px; font-size: 14px;
        }
        .loading { text-align: center; padding: 20px; color: var(--tg-hint); font-size: 14px; }
        .loading i { margin-bottom: 8px; }
        .error-state { text-align: center; padding: 20px; color: #ff3b30; font-size: 14px; }
        .debug-info {
            font-size: 10px; color: var(--tg-hint);
            text-align: center; padding: 8px; background: var(--tg-secondary-bg);
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-title">ЧБ Новости</div>
        <div class="header-subtitle">Информационный центр</div>
    </header>

    <div class="status-bar">
        <div class="status-online">
            <div class="status-dot"></div>
            <span>Онлайн</span>
        </div>
        <div class="status-time" id="currentTime">--:--</div>
    </div>

    <div class="section">
        <div class="section-header">Игры</div>
        <a href="#" class="game-item" id="gameDog">
            <div class="game-icon dog"><i class="fas fa-dog"></i></div>
            <div class="game-info">
                <div class="game-name">Служебная Собака</div>
                <div class="game-desc">ПОГОНЯ ULTIMATE</div>
            </div>
            <div class="game-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>
        <a href="#" class="game-item" id="gamePet">
            <div class="game-icon pet"><i class="fas fa-paw"></i></div>
            <div class="game-info">
                <div class="game-name">Virtual PET</div>
                <div class="game-desc">Тамагочи 2.0</div>
            </div>
            <div class="game-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>
    </div>

    <div class="section">
        <div class="section-header">
            <span>Новости по категориям</span>
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i> Обновить
            </button>
        </div>
        <div id="newsContainer">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Загрузка новостей...</div>
            </div>
        </div>
    </div>

    <div class="download-section">
        <button class="download-btn" id="downloadBtn">
            <i class="fas fa-file-download"></i>
            <span>Скачать дайджест</span>
        </button>
    </div>

    <footer class="footer">
        <div>© 2026 ЧБ Новости</div>
        <a href="https://t.me/cheburashNEWS" class="footer-link" target="_blank">
            <i class="fab fa-telegram"></i> Наш канал
        </a>
    </footer>
    
    <div class="debug-info" id="debugInfo"></div>

    <script>
        // ========== TELEGRAM INIT ==========
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // ========== CONFIG ==========
        const CONFIG = {
            // Рабочие RSS-ленты (проверено)
            RSS_FEEDS: {
                world: [
                    'https://ria.ru/export/rss2/index.xml',
                    'https://tass.ru/rss/v2.xml'
                ],
                russia: [
                    'https://ria.ru/export/rss2/russia.xml',
                    'https://rg.ru/rss/region.xml'
                ],
                svo: [
                    'https://ria.ru/export/rss2/russia.xml' // Используем российские новости как базу для СВО
                ]
            },
            // Цепочка CORS-прокси (пробуем по очереди)
            CORS_PROXIES: [
                'https://api.allorigins.win/raw?url=',
                'https://corsproxy.io/?',
                'https://api.codetabs.com/v1/proxy?quest=',
                '' // Пустая строка = прямой запрос (на случай если хостинг разрешает)
            ],
            MAX_NEWS: 5,
            TIMEOUT: 15000,
            // Ссылки на игры
            GAMES: {
                dog: { name: 'Служебная Собака', subtitle: 'ПОГОНЯ ULTIMATE', url: 'ВАША_ССЫЛКА_НА_СОБАКУ' },
                pet: { name: 'Virtual PET', subtitle: 'Тамагочи 2.0', url: 'ВАША_ССЫЛКА_НА_PET' }
            },
            TELEGRAM: { channel: 'https://t.me/cheburashNEWS', bot: '@CheburashNEWS_bot' }
        };

        // ========== STATE ==========
        let newsCache = { world: [], russia: [], svo: [] };
        let debugMessages = [];

        // ========== UTILS ==========
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').textContent = now.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
        }
        setInterval(updateTime, 1000);
        updateTime();

        function stripHtml(html) {
            if (!html) return '';
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }

        function timeAgo(date) {
            if (!date) return '';
            const now = new Date();
            const diff = Math.floor((now - date) / 1000);
            if (diff < 60) return 'только что';
            if (diff < 3600) return Math.floor(diff/60) + ' мин. назад';
            if (diff < 86400) return Math.floor(diff/3600) + ' ч. назад';
            return date.toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
        }

        function haptic(type='light') {
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred(type);
        }

        function logDebug(msg) {
            debugMessages.push(`[${new Date().toLocaleTimeString()}] ${msg}`);
            if (debugMessages.length > 3) debugMessages.shift();
            document.getElementById('debugInfo').textContent = debugMessages.join(' | ');
            console.log('[ЧБ]', msg);
        }

        // ========== RSS FETCH WITH FALLBACK ==========
        async function fetchWithProxy(url, proxies = CONFIG.CORS_PROXIES) {
            for (const proxy of proxies) {
                try {
                    const fetchUrl = proxy + encodeURIComponent(url);
                    logDebug(`Пробуем: ${proxy ? proxy.substring(0,40)+'...' : 'прямой запрос'}`);
                    
                    const controller = new AbortController();
                    const timeout = setTimeout(() => controller.abort(), CONFIG.TIMEOUT);
                    
                    const response = await fetch(fetchUrl, {
                        signal: controller.signal,
                        headers: { 'Accept': 'application/rss+xml, application/xml, text/xml' }
                    });
                    clearTimeout(timeout);
                    
                    if (!response.ok) throw new Error(`HTTP ${response.status}`);
                    const text = await response.text();
                    
                    // Проверка что это действительно XML
                    if (!text.includes('<rss') && !text.includes('<feed')) {
                        throw new Error('Не XML-ответ');
                    }
                    
                    logDebug(`✓ Успех через ${proxy ? proxy.split('/')[2] : 'прямой'}`);
                    return text;
                } catch (e) {
                    logDebug(`✗ Ошибка: ${e.message}`);
                    continue;
                }
            }
            throw new Error('Все прокси не сработали');
        }

        async function parseFeed(xmlText, category) {
            try {
                const parser = new RSSParser({
                    customFields: { item: ['content:encoded', 'media:content'] }
                });
                const feed = await parser.parseString(xmlText);
                
                return (feed.items || []).slice(0, CONFIG.MAX_NEWS).map(item => ({
                    title: stripHtml(item.title)?.trim() || 'Без заголовка',
                    link: item.link?.trim() || '#',
                    pubDate: item.pubDate ? new Date(item.pubDate) : new Date(),
                    source: (item.source?.trim() || new URL(item.link).hostname).replace('www.',''),
                    category
                })).filter(n => n.title && n.link);
            } catch (e) {
                logDebug(`Парсинг ошибка: ${e.message}`);
                return [];
            }
        }

        async function fetchCategory(category) {
            const feeds = CONFIG.RSS_FEEDS[category] || [];
            logDebug(`Загрузка категории "${category}": ${feeds.length} источников`);
            
            let allItems = [];
            
            for (const feedUrl of feeds) {
                try {
                    const xml = await fetchWithProxy(feedUrl);
                    const items = await parseFeed(xml, category);
                    allItems = [...allItems, ...items];
                    logDebug(`+ ${items.length} новостей из ${feedUrl.split('/')[2]}`);
                } catch (e) {
                    logDebug(`Не удалось загрузить ${feedUrl}: ${e.message}`);
                }
            }
            
            // Убираем дубликаты по заголовкам и сортируем
            const seen = new Set();
            return allItems
                .filter(item => {
                    const key = item.title.toLowerCase();
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                })
                .sort((a,b) => new Date(b.pubDate) - new Date(a.pubDate))
                .slice(0, CONFIG.MAX_NEWS)
                .map(item => ({...item, timeAgo: timeAgo(item.pubDate)}));
        }

        // ========== MOCK DATA (fallback) ==========
        function getMockNews(category) {
            const mocks = {
                world: [
                    { title: 'Международные организации обсуждают новые инициативы', link: 'https://ria.ru/world', pubDate: new Date(), source: 'ria.ru', category: 'world' },
                    { title: 'Экономические показатели демонстрируют стабильность', link: 'https://tass.ru/world', pubDate: new Date(Date.now()-3600000), source: 'tass.ru', category: 'world' }
                ],
                russia: [
                    { title: 'Правительство утвердило новые меры поддержки', link: 'https://ria.ru/russia', pubDate: new Date(), source: 'ria.ru', category: 'russia' },
                    { title: 'Регионы отчитались о выполнении планов развития', link: 'https://rg.ru/russia', pubDate: new Date(Date.now()-7200000), source: 'rg.ru', category: 'russia' }
                ],
                svo: [
                    { title: 'Минобороны: плановые задачи выполнены', link: 'https://ria.ru/russia', pubDate: new Date(), source: 'mil.ru', category: 'svo' },
                    { title: 'Специальная операция: сводка за сутки', link: 'https://tass.ru/russia', pubDate: new Date(Date.now()-1800000), source: 'tass.ru', category: 'svo' }
                ]
            };
            return (mocks[category] || []).map(i => ({...i, timeAgo: timeAgo(i.pubDate)}));
        }

        // ========== RENDER ==========
        async function loadAllNews() {
            const container = document.getElementById('newsContainer');
            container.innerHTML = `<div class="loading"><i class="fas fa-circle-notch fa-spin"></i><div>Загрузка новостей...</div></div>`;
            logDebug('Начало загрузки');

            try {
                const [world, russia, svo] = await Promise.all([
                    fetchCategory('world').catch(() => getMockNews('world')),
                    fetchCategory('russia').catch(() => getMockNews('russia')),
                    fetchCategory('svo').catch(() => getMockNews('svo'))
                ]);

                newsCache = { world, russia, svo };
                renderNews();
                logDebug(`Завершено: ${world.length}+${russia.length}+${svo.length} новостей`);
                
            } catch (error) {
                logDebug(`Критическая ошибка: ${error.message}`);
                // Полностью на моках
                newsCache = {
                    world: getMockNews('world'),
                    russia: getMockNews('russia'),
                    svo: getMockNews('svo')
                };
                renderNews();
            }
        }

        function renderNews() {
            const container = document.getElementById('newsContainer');
            const categories = [
                { key: 'world', name: '🌍 Мир', class: 'tag-world' },
                { key: 'russia', name: '🇷🇺 Россия', class: 'tag-russia' },
                { key: 'svo', name: '⚔️ СВО', class: 'tag-svo' }
            ];

            let html = '';
            let total = 0;

            categories.forEach(cat => {
                const items = newsCache[cat.key] || [];
                if (items.length === 0) return;
                total += items.length;
                
                html += `<div class="category-block">
                    <div class="category-title">${cat.name} <span class="category-badge">${items.length}</span></div>`;
                
                items.forEach(item => {
                    html += `<div class="news-item">
                        <span class="news-tag ${cat.class}">${item.source}</span>
                        <div class="news-text">${item.title}</div>
                        <div class="news-source">${item.timeAgo}</div>
                        <a href="${item.link}" class="news-time" target="_blank" style="color:var(--tg-link);text-decoration:none">Читать →</a>
                    </div>`;
                });
                html += `</div>`;
            });

            if (total === 0) {
                html = `<div class="error-state">
                    <i class="fas fa-inbox"></i>
                    <div style="margin-top:8px">Нет новостей</div>
                    <button class="refresh-btn" onclick="loadAllNews()" style="margin-top:12px">
                        <i class="fas fa-sync-alt"></i> Обновить
                    </button>
                </div>`;
            }

            container.innerHTML = html;
            logDebug(`Отображено: ${total} новостей`);
        }

        // ========== DIGEST ==========
        function generateDigestContent() {
            const date = new Date().toLocaleDateString('ru-RU', {day:'numeric',month:'long',year:'numeric'});
            const time = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});

            let c = `════════════════════════════════════════════════════\n`;
            c += `         ЧБ НОВОСТИ | ИНФОРМАЦИОННЫЙ ДАЙДЖЕСТ\n`;
            c += `════════════════════════════════════════════════════\n\n`;
            c += `📅 Дата: ${date}\n⏰ Время: ${time}\n📊 Статус: Актуальная сводка\n\n`;
            c += `────────────────────────────────────────────────────\n\n`;

            c += `🎮 ИГРОВЫЕ МОДУЛИ\n`;
            c += `────────────────────────────────────────────────────\n`;
            c += `  [1] ${CONFIG.GAMES.dog.name}: ${CONFIG.GAMES.dog.subtitle}\n`;
            c += `  [2] ${CONFIG.GAMES.pet.name}: ${CONFIG.GAMES.pet.subtitle}\n\n`;

            const cats = [
                {key:'world', name:'🌍 МИР'},
                {key:'russia', name:'🇷🇺 РОССИЯ'},
                {key:'svo', name:'⚔️ СВО'}
            ];

            cats.forEach(cat => {
                const items = newsCache[cat.key] || [];
                c += `${cat.name}\n`;
                c += `────────────────────────────────────────────────────\n`;
                if (!items.length) {
                    c += `  Нет данных\n\n`;
                } else {
                    items.forEach((item, i) => {
                        c += `  [${i+1}] ${item.title}\n`;
                        c += `      Источник: ${item.source}\n`;
                        c += `      Время: ${item.timeAgo}\n`;
                        c += `      Ссылка: ${item.link}\n\n`;
                    });
                }
            });

            c += `────────────────────────────────────────────────────\n\n`;
            c += `📬 ТЕЛЕГРАМ КАНАЛ: ${CONFIG.TELEGRAM.channel}\n`;
            c += `🤖 БОТ: ${CONFIG.TELEGRAM.bot}\n\n`;
            c += `════════════════════════════════════════════════════\n`;
            c += `         © 2026 ЧБ НОВОСТНОЙ АГРЕГАТОР\n`;
            c += `════════════════════════════════════════════════════\n`;
            return c;
        }

        function downloadDigest() {
            haptic('success');
            const content = generateDigestContent();
            const blob = new Blob([content], {type:'text/plain;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `CHB_Digest_${new Date().toISOString().slice(0,10)}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            tg.showAlert({title:'✅ Готово', message:'Дайджест загружен', buttons:[{type:'ok'}]});
            logDebug('Дайджест скачан');
        }

        // ========== EVENTS ==========
        document.querySelectorAll('a, button').forEach(el => {
            el.addEventListener('click', () => haptic('light'));
        });
        document.getElementById('refreshBtn').addEventListener('click', () => { haptic('medium'); loadAllNews(); });
        document.getElementById('downloadBtn').addEventListener('click', downloadDigest);
        document.getElementById('gameDog').href = CONFIG.GAMES.dog.url;
        document.getElementById('gamePet').href = CONFIG.GAMES.pet.url;

        // ========== START ==========
        logDebug('Приложение запущено');
        loadAllNews();
    </script>
</body>
</html>
