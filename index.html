<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>ЧБ Новости</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/rss-parser@3.13.0/dist/rss-parser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-title">ЧБ Новости</div>
        <div class="header-subtitle">Информационный центр</div>
    </header>

    <!-- Status Bar -->
    <div class="status-bar">
        <div class="status-online">
            <div class="status-dot"></div>
            <span>Онлайн</span>
        </div>
        <div class="status-time" id="currentTime">--:--</div>
    </div>

    <!-- Games Section -->
    <div class="section">
        <div class="section-header">Игры</div>
        
        <a href="#" class="game-item" id="gameDog">
            <div class="game-icon dog"><i class="fas fa-dog"></i></div>
            <div class="game-info">
                <div class="game-name">Служебная Собака</div>
                <div class="game-desc">ПОГОНЯ ULTIMATE</div>
            </div>
            <div class="game-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>

        <a href="#" class="game-item" id="gamePet">
            <div class="game-icon pet"><i class="fas fa-paw"></i></div>
            <div class="game-info">
                <div class="game-name">Virtual PET</div>
                <div class="game-desc">Тамагочи 2.0</div>
            </div>
            <div class="game-arrow"><i class="fas fa-chevron-right"></i></div>
        </a>
    </div>

    <!-- News Section -->
    <div class="section">
        <div class="section-header">
            <span>Последние новости</span>
            <button class="refresh-btn" id="refreshBtn">
                <i class="fas fa-sync-alt"></i>
            </button>
        </div>
        <div id="newsContainer">
            <div class="loading">
                <i class="fas fa-circle-notch fa-spin"></i>
                <div>Загрузка новостей...</div>
            </div>
        </div>
    </div>

    <!-- Download Section -->
    <div class="download-section">
        <button class="download-btn" id="downloadBtn">
            <i class="fas fa-file-download"></i>
            <span>Скачать дайджест</span>
        </button>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div>© 2026 ЧБ Новости</div>
        <a href="https://t.me/cheburashNEWS" class="footer-link" target="_blank">
            <i class="fab fa-telegram"></i> Наш канал
        </a>
    </footer>

    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
